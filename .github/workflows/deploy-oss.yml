name: Deploy to OSS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OSS2
        run: pip install oss2

      - name: Replace OSS contents with build folder
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
        run: |
          python3 << 'EOF'
          import os
          import oss2

          access_key_id = os.environ["OSS_ACCESS_KEY_ID"]
          access_key_secret = os.environ["OSS_ACCESS_KEY_SECRET"]
          bucket_name = os.environ["OSS_BUCKET"]
          region = os.environ["OSS_REGION"]

          endpoint = f"https://{region}.aliyuncs.com"
          auth = oss2.Auth(access_key_id, access_key_secret)
          bucket = oss2.Bucket(auth, endpoint, bucket_name)

          print(f"Connected to bucket: {bucket_name}")
          print(f"Endpoint: {endpoint}")

          # Check if bucket exists and is accessible
          bucket.get_bucket_info()
          print("Bucket connected successfully!")

          # Delete all existing objects in bucket
          print("Deleting existing objects in bucket...")
          for obj in oss2.ObjectIterator(bucket):
              print(f"Deleting: {obj.key}")
              bucket.delete_object(obj.key)

          # Upload all files from build directory
          build_dir = "./build"
          if not os.path.isdir(build_dir):
              raise Exception(f"Build directory not found: {build_dir}")

          print("Uploading new build files...")
          for root, dirs, files in os.walk(build_dir):
              for file in files:
                  file_path = os.path.join(root, file)
                  oss_path = os.path.relpath(file_path, build_dir).replace("\\", "/")
                  print(f"Uploading {file_path} to /{oss_path}")
                  bucket.put_object_from_file(oss_path, file_path)

          print("Deployment completed successfully!")
          EOF
