          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResult'
        '404':
          description: User does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResult'
      security:
      - apikey-header-apikey: []
components:
  schemas:
    ResultVO:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code. 200-Success, 400-Parameter error, 500-Interface exception
        msg:
          type: string
          description: Response message
        data:
          type: object
          description: Response data
          additionalProperties: true
    FieldDefine:
      type: object
      required:
      - name
      - type
      properties:
        name:
          type: string
          description: Field name. Starts with a letter, supports letters, numbers and underscores. Maximum length 63
          minLength: 1
          maxLength: 63
        type:
          type: string
          description: 'Field type: INTEGER, LONG, FLOAT, DOUBLE, BOOLEAN, DATETIME, STRING'
          enum:
          - INTEGER
          - LONG
          - FLOAT
          - DOUBLE
          - BOOLEAN
          - DATETIME
          - STRING
        unique:
          type: boolean
          description: Whether it is unique constraint
          default: false
        index:
          type: string
          description: Key of corresponding protocol field
          maxLength: 63
        displayName:
          type: string
          description: Display name
          maxLength: 128
        remark:
          type: string
          description: Remark
          maxLength: 255
        maxLen:
          type: integer
          format: int32
          description: Maximum length (valid for string type of field)
          minimum: 0
        systemField:
          type: boolean
          description: Whether it is system parameter
          default: false
    CreateOpenApiFolderDto:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Topic name, consistent with path display name
          minLength: 1
          maxLength: 63
        alias:
          type: string
          description: Topic alias. Maximum length 63 characters. Supports letters, numbers and underscores. If empty, the system automatically generates it
          maxLength: 63
          pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
        displayName:
          type: string
          description: Topic display name. Supports modification and duplicate names
          maxLength: 128
        parentAlias:
          type: string
          description: Parent path alias
          maxLength: 63
        description:
          type: string
          description: Description
          maxLength: 255
        definition:
          type: array
          description: Field definition
          items:
            $ref: '#/components/schemas/FieldDefine'
        extendProperties:
          type: object
          description: Extended properties. Maximum 3 entries are supported
          additionalProperties:
            type: object
          maxProperties: 3
        templateAlias:
          type: string
          description: Associated template alias
          maxLength: 63
    CreateOpenApiFileDto:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Topic name, consistent with path display name
          minLength: 1
          maxLength: 63
        alias:
          type: string
          description: Topic alias. Maximum length 63 characters. Supports letters, numbers and underscores. If empty, the system automatically generates it
          maxLength: 63
          pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
        displayName:
          type: string
          description: Topic display name. Supports modification and duplicate names
          maxLength: 128
        parentAlias:
          type: string
          description: Parent path alias
          maxLength: 63
        dataType:
          type: integer
          format: int16
          description: 1-Time series, 2-Relational, 3-Real-time calculation, 4-Historical calculation, 6-Aggregation, 7-Time series reference
          minimum: 1
          maximum: 7
        description:
          type: string
          description: Description
