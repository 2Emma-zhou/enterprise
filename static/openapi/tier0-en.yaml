        schema:
          type: integer
          default: 1
          minimum: 1
      - name: pageSize
        in: query
        description: Records per page
        schema:
          type: integer
          default: 20
          minimum: 1
      - name: key
        in: query
        description: Label name query. Supports fuzzy match
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelPageResult'
      security:
      - apikey-header-apikey: []
    post:
      summary: Create label
      description: Create new label
      operationId: createLabel
      tags:
