openapi: 3.0.1
info:
  title: Tier0 UNS Open API
  description: UNS Open API for managing paths, topics, templates, labels, and users
  version: 1.0.0
tags:
- name: Path/Topic Management
  description: Path and topic management operations
- name: Template Management
  description: Template management operations
- name: Label Management
  description: Label management operations
- name: Batch Operations
  description: Batch operations for paths and topics
- name: User Management
  description: User management operations
paths:
  /open-api/uns/attachment:
    post:
      summary: Upload topic attachments
      description: Upload attachments to a specified topic or path. Supports multiple attachments. The maximum size of each attachment is 10 MB.
      operationId: uploadUnsAttachment
      tags:
      - Path/Topic Management
      parameters:
      - name: alias
        in: query
        description: Topic or path alias
        required: true
        schema:
          type: string
          maxLength: 63
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  format: binary
                  type: string
                  description: Attachments. Supports multiple attachments. The maximum size of each attachment is 10 MB
              required:
              - files
        required: true
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: Status code. 200-Success, 400-Parameter error, 500-Interface exception
                  msg:
                    type: string
                    description: Response message
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              description: Attachment ID
                            unsAlias:
                              type: string
                              description: Topic alias
                            originalName:
                              type: string
                              description: Original name
                            attachmentName:
                              type: string
                              description: Attachment name
                            attachmentPath:
                              type: string
                              description: Path
                            extensionName:
                              type: string
                              description: File extension
                            createAt:
                              type: integer
                              description: Creation timestamp
      security:
      - apikey-header-apikey: []
  /open-api/uns/folder/schema:
    get:
      summary: Get path schema/metadata structure
      description: Path schema/definition structure
      operationId: getFolderSchema
      tags:
      - Path/Topic Management
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
      security:
      - apikey-header-apikey: []
  /open-api/uns/file/schema:
    get:
      summary: Get topic schema/metadata structure
      description: Topic schema/definition structure
      operationId: getFileSchema
      tags:
      - Path/Topic Management
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
      security:
      - apikey-header-apikey: []
  /open-api/uns/template/schema:
    get:
      summary: Get template schema/metadata structure
      description: Template schema/definition structure
      operationId: getTemplateSchema
      tags:
      - Template Management
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
