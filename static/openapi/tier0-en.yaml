  /open-api/uns/folder:
    post:
      summary: Create path
      description: Create path. Supports custom field definitions and extended properties.
      operationId: createFolder
      tags:
      - Path/Topic Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOpenApiFolderDto'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
