      parameters:
      - name: pageNo
        in: query
        description: Current page number
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: pageSize
        in: query
        description: Records per page
        schema:
          type: integer
          default: 20
          minimum: 1
      - name: username
        in: query
        description: Username. Exact match
        schema:
          type: string
      - name: displayName
        in: query
        description: Display name. Supports fuzzy match
        schema:
          type: string
      - name: email
        in: query
        description: Email. Supports fuzzy match
        schema:
          type: string
      - name: phone
        in: query
        description: Phone number. Supports fuzzy match
        schema:
