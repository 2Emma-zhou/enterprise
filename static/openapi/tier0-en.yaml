      security:
      - apikey-header-apikey: []
  /open-api/uns/label/schema:
    get:
      summary: Get label schema/metadata structure
      description: Label schema/definition structure
      operationId: getLabelSchema
      tags:
      - Label Management
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
      security:
      - apikey-header-apikey: []
  /open-api/uns/folder/{alias}:
    get:
      summary: Get path details by alias
      description: Get detailed path information based on path alias.
      operationId: getFolderByAlias
      tags:
      - Path/Topic Management
      parameters:
      - name: alias
        in: path
        description: Alias
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 63
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
      - apikey-header-apikey: []
  /open-api/uns/file/{alias}:
    get:
      summary: Get topic details by alias
      description: Get topic details by alias.
      operationId: getFileByAlias
      tags:
      - Path/Topic Management
      parameters:
      - name: alias
        in: path
        description: Alias
        required: true
        schema:
          type: string
