      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateVo'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
