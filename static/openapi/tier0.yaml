openapi: 3.0.1
info:
  title: Tier0 UNS Open API
  description: UNS Open API for managing folders, files, templates, labels, and users
  version: 1.0.0
tags:
  - name: 文件夹/文件管理
    description: Folder and file management operations
  - name: 模板管理
    description: Template management operations
  - name: 标签管理
    description: Label management operations
  - name: 批量操作
    description: Batch operations for files and folders
  - name: 用户管理
    description: User management operations
paths:
  /open-api/uns/attachment:
    post:
      summary: 附件上传
      description: 上传附件到指定文件或文件夹，支持多个附件上传，单个附件最大10MB
      operationId: uploadUnsAttachment
      tags:
        - 文件夹/文件管理
      parameters:
        - name: alias
          in: query
          description: 文件或文件夹别名
          required: true
          schema:
            type: string
            maxLength: 63
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  format: binary
                  type: string
                  description: 附件，支持多个附件上传，单个附件最大10MB
              required:
                - files
        required: true
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: 状态码 200-成功 400-参数错误 500-接口异常
                  msg:
                    type: string
                    description: 响应消息
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              description: 附件ID
                            unsAlias:
                              type: string
                              description: 文件别名
                            originalName:
                              type: string
                              description: 原始名称
                            attachmentName:
                              type: string
                              description: 附件名称
                            attachmentPath:
                              type: string
                              description: 路径
                            extensionName:
                              type: string
                              description: 扩展名
                            createAt:
                              type: integer
                              description: 创建时间戳
      security:
        - apikey-header-apikey: []

  /open-api/uns/folder/schema:
    get:
      summary: 查询文件夹schema 元数据结构
      description: 文件夹schema 定义结构
      operationId: getFolderSchema
      tags:
        - 文件夹/文件管理
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
      security:
        - apikey-header-apikey: []

  /open-api/uns/file/schema:
    get:
      summary: 查询文件schema 元数据结构
      description: 文件schema 定义结构
      operationId: getFileSchema
      tags:
        - 文件夹/文件管理
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
      security:
        - apikey-header-apikey: []

  /open-api/uns/template/schema:
    get:
      summary: 查询模板schema 元数据结构
      description: 模板schema 定义结构
      operationId: getTemplateSchema
      tags:
        - 模板管理
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
      security:
        - apikey-header-apikey: []

  /open-api/uns/label/schema:
    get:
      summary: 查询标签schema 元数据结构
      description: 标签schema 定义结构
      operationId: getLabelSchema
      tags:
        - 标签管理
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
      security:
        - apikey-header-apikey: []

  /open-api/uns/folder/{alias}:
    get:
      summary: 别名查询文件夹详情
      description: 根据文件夹别名查询文件夹详细信息
      operationId: getFolderByAlias
      tags:
        - 文件夹/文件管理
      parameters:
        - name: alias
          in: path
          description: 别名
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 63
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/file/{alias}:
    get:
      summary: 别名查询文件详情
      description: 根据文件别名查询文件详细信息
      operationId: getFileByAlias
      tags:
        - 文件夹/文件管理
      parameters:
        - name: alias
          in: path
          description: 别名
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 63
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/folder/byPath:
    get:
      summary: 路径查询文件夹详情
      description: 根据路径查询文件夹详细信息
      operationId: getFolderByPath
      tags:
        - 文件夹/文件管理
      parameters:
        - name: path
          in: query
          description: 文件夹路径
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/file/byPath:
    get:
      summary: 路径查询文件详情
      description: 根据路径查询文件详细信息
      operationId: getFileByPath
      tags:
        - 文件夹/文件管理
      parameters:
        - name: path
          in: query
          description: 文件路径
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/folder:
    post:
      summary: 创建文件夹
      description: 创建文件夹，支持定义字段和扩展属性
      operationId: createFolder
      tags:
        - 文件夹/文件管理
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOpenApiFolderDto'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/file:
    post:
      summary: 创建文件
      description: 创建文件，支持定义字段、引用对象、表达式等
      operationId: createFile
      tags:
        - 文件夹/文件管理
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOpenApiFileDto'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/folder/detail/{alias}:
    put:
      summary: 修改文件夹
      description: 根据别名修改文件夹信息
      operationId: updateFolder
      tags:
        - 文件夹/文件管理
      parameters:
        - name: alias
          in: path
          description: 别名
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 63
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOpenApiFolderDto'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/file/detail/{alias}:
    put:
      summary: 修改文件
      description: 根据别名修改文件信息
      operationId: updateFile
      tags:
        - 文件夹/文件管理
      parameters:
        - name: alias
          in: path
          description: 别名
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 63
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOpenApiFileDto'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/batch/alias:
    delete:
      summary: 根据别名集合批量删除文件夹和文件
      description: 根据别名集合批量删除文件夹和文件，返回删除结果
      operationId: batchRemoveByAlias
      tags:
        - 批量操作
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                aliases:
                  type: array
                  items:
                    type: string
                  description: 别名数组
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveResult'
      security:
        - apikey-header-apikey: []

  /open-api/uns/file/current/batchQuery:
    post:
      summary: 批量查询文件实时值
      description: 根据别名数组批量查询文件实时值
      operationId: batchQueryFile
      tags:
        - 批量操作
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: string
                  description: 别名数组
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/file/current/batchQuery/byPath:
    post:
      summary: 根据文件路径批量查询文件实时值
      description: 根据路径数组批量查询文件实时值
      operationId: batchQueryFileByPath
      tags:
        - 批量操作
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: string
                  description: 路径数组
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/file/current/batchUpdate:
    post:
      summary: 批量写文件实时值
      description: 批量写入文件实时值
      operationId: batchUpdateFile
      tags:
        - 批量操作
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileDTOArray'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUpdateFileResult'
      security:
        - apikey-header-apikey: []

  /open-api/uns/condition/tree:
    post:
      summary: 多条件分页查询树结构
      description: 根据多条件分页查询UNS树结构
      operationId: unsTreeByDefinitions
      tags:
        - 批量操作
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnsTreeCondition'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreePageResult'
      security:
        - apikey-header-apikey: []

  /open-api/uns/file/history/batch/query:
    post:
      summary: 批量查询文件历史值
      description: 批量查询文件历史值，支持聚合、补点等高级功能
      operationId: batchQueryFileHistoryValue
      tags:
        - 批量操作
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoryValueRequest'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryValueResult'
      security:
        - apikey-header-apikey: []

  /open-api/uns/template:
    get:
      summary: 查询模板列表
      description: 分页查询模板列表，支持关键字搜索和订阅过滤
      operationId: templatePageList
      tags:
        - 模板管理
      parameters:
        - name: pageNo
          in: query
          description: 当前页数
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: 每页记录数
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: key
          in: query
          description: 关键字搜索
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplatePageResult'
      security:
        - apikey-header-apikey: []
    post:
      summary: 新增模板
      description: 创建新模板
      operationId: createTemplate
      tags:
        - 模板管理
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateVo'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/template/{alias}:
    get:
      summary: 查询模板详情
      description: 根据别名查询模板详细信息
      operationId: templateDetailByAlias
      tags:
        - 模板管理
      parameters:
        - name: alias
          in: path
          description: 模板别名
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []
    put:
      summary: 修改模板
      description: 根据别名修改模板信息
      operationId: updateTemplate
      tags:
        - 模板管理
      parameters:
        - name: alias
          in: path
          description: 模板别名
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateDto'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []
    delete:
      summary: 删除模板
      description: 根据别名删除模板
      operationId: deleteTemplate
      tags:
        - 模板管理
      parameters:
        - name: alias
          in: path
          description: 模板别名
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/label:
    get:
      summary: 标签列表
      description: 列出所有支持的标签，支持模糊搜索
      operationId: allLabels
      tags:
        - 标签管理
      parameters:
        - name: pageNo
          in: query
          description: 当前页数
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: 每页记录数
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: key
          in: query
          description: 标签名称查询，支持模糊匹配
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelPageResult'
      security:
        - apikey-header-apikey: []
    post:
      summary: 创建标签
      description: 创建新标签
      operationId: createLabel
      tags:
        - 标签管理
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLabelDto'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/label/{id}:
    get:
      summary: 标签详情
      description: 根据ID查询标签详细信息
      operationId: labelDetail
      tags:
        - 标签管理
      parameters:
        - name: id
          in: path
          description: 标签ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []
    put:
      summary: 修改标签
      description: 根据ID修改标签信息
      operationId: updateLabel
      tags:
        - 标签管理
      parameters:
        - name: id
          in: path
          description: 标签ID
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLabelDto'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []
    delete:
      summary: 删除标签
      description: 根据ID删除标签
      operationId: deleteLabel
      tags:
        - 标签管理
      parameters:
        - name: id
          in: path
          description: 标签ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/batch/makeLabel:
    post:
      summary: 批量文件打标签
      description: 为文件批量打标签
      operationId: makeLabel
      tags:
        - 标签管理
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeLabelDtoArray'
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/uns/cancelLabel/{alias}:
    put:
      summary: 文件取消标签
      description: 为文件取消指定标签
      operationId: cancelLabel
      tags:
        - 标签管理
      parameters:
        - name: alias
          in: path
          description: 文件别名
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: string
                  description: 标签名称数组
        required: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
      security:
        - apikey-header-apikey: []

  /open-api/user/pageList:
    get:
      summary: 用户列表
      description: 分页查询用户列表，支持按用户名、显示名称、邮箱、手机号等条件过滤
      operationId: openUserPageList
      tags:
        - 用户管理
      parameters:
        - name: pageNo
          in: query
          description: 当前页数
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: 每页记录数
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: username
          in: query
          description: 用户名，精准查询
          schema:
            type: string
        - name: displayName
          in: query
          description: 显示名称，支持模糊查询
          schema:
            type: string
        - name: email
          in: query
          description: 邮箱，支持模糊查询
          schema:
            type: string
        - name: phone
          in: query
          description: 手机号，支持模糊查询
          schema:
            type: string
        - name: enabled
          in: query
          description: 是否启用
          schema:
            type: boolean
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenUserPageResult'
      security:
        - apikey-header-apikey: []

  /open-api/user/{username}:
    get:
      summary: 用户详情
      description: 根据用户名查询用户详情
      operationId: openUserDetail
      tags:
        - 用户管理
      parameters:
        - name: username
          in: path
          description: 用户名
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResult'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResult'
      security:
        - apikey-header-apikey: []

components:
  schemas:
    ResultVO:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: 状态码 200-成功 400-参数错误 500-接口异常
        msg:
          type: string
          description: 响应消息
        data:
          type: object
          description: 响应数据
          additionalProperties: true

